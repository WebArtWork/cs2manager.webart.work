<section class="mx-auto w-full max-w-[var(--container)] px-4 py-8 sm:px-6 sm:py-12">
	<div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
		<div>
			<p class="text-xs font-semibold uppercase text-[var(--c-text-muted)]">Teams</p>
			<h1 class="mt-2 text-3xl font-semibold text-[var(--c-text-strong)] sm:text-4xl">
				Team management
			</h1>
			<p class="mt-3 max-w-2xl text-base leading-7 text-[var(--c-text)]">
				Review featured CS2 teams before the API connection is added.
			</p>
		</div>
	</div>

	<div class="mt-8 grid gap-4">
		@for (team of featuredTeams; track team.name) {
			<div class="rounded-[var(--radius-card)] border border-[var(--c-border)] bg-[var(--c-bg-secondary)] p-5 sm:p-6">
				<div class="grid gap-5 sm:grid-cols-[8rem_minmax(0,1fr)] sm:items-center">
					<img
						class="h-28 w-28 rounded-[var(--radius-card)] border border-[var(--c-border)] object-cover"
						[ngSrc]="team.pictureSrc"
						[alt]="team.name"
						width="112"
						height="112"
					/>

					<div>
						<p class="text-sm text-[var(--c-text-muted)]">Featured team</p>
						<h2 class="mt-1 text-2xl font-semibold text-[var(--c-text-strong)]">{{ team.name }}</h2>
						<dl class="mt-4 grid gap-4 sm:grid-cols-3">
							@for (stat of team.stats; track stat.label) {
								<div>
									<dt class="text-sm text-[var(--c-text-muted)]">{{ stat.label }}</dt>
									<dd class="mt-1 font-semibold leading-6 text-[var(--c-text-strong)]">{{ stat.value }}</dd>
								</div>
							}
						</dl>
					</div>
				</div>
			</div>
		}
	</div>
</section>
